<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560" width="1400" height="560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117" />
      <stop offset="1" stop-color="#161b22" />
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff" />
      <stop offset="1" stop-color="#3fb950" />
    </linearGradient>
  </defs>

  <!-- canvas -->
  <rect width="1400" height="560" fill="url(#bg)" />

  <!-- brand icon in a rounded square (left) -->
  <rect x="80" y="120" width="320" height="320" rx="72" fill="url(#brand)" />
  <g transform="translate(80,120) scale(0.625)">
    <rect x="92" y="100" width="220" height="308" rx="34" fill="#ffffff" />
    <rect x="124" y="150" width="156" height="26" rx="13" fill="#58a6ff" />
    <rect x="124" y="198" width="180" height="22" rx="11" fill="#9aa7b5" />
    <rect x="124" y="238" width="120" height="22" rx="11" fill="#9aa7b5" />
    <rect x="124" y="278" width="156" height="22" rx="11" fill="#9aa7b5" />
    <rect x="288" y="300" width="172" height="116" rx="38" fill="#0d1117" />
    <path d="M322 416 L300 456 L350 416 Z" fill="#0d1117" />
    <circle cx="328" cy="358" r="15" fill="#ffffff" />
    <circle cx="374" cy="358" r="15" fill="#ffffff" />
    <circle cx="420" cy="358" r="15" fill="#ffffff" />
  </g>

  <!-- wordmark -->
  <text x="470" y="280" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
