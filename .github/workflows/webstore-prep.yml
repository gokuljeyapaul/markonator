name: webstore-prep

# Media-heavy Chrome Web Store prep. Runs AFTER the package release is
# published (release.yml), generates the demo GIF, 1280x800 store screenshots,
# the 1400x560 marquee tile, the 440x280 small promo tile, and the promo video
# (MP4 for YouTube), then attaches all of them to the release.
#
# Triggered automatically on release publication, or manually with a tag.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach media to (e.g. v0.1.9)"
        required: true

permissions:
  contents: write

jobs:
  media:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: rel
        run: echo "tag=${{ github.event.inputs.tag || github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright deps
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Capture screenshots
        run: npx playwright test --project=screenshots --reporter=list

      - name: Build demo GIF
        run: bash scripts/make-gif.sh screenshots screenshots/markonator.gif

      - name: Build 1280x800 Web Store screenshots
        run: bash scripts/make-store-shots.sh screenshots store-shots

      - name: Build 1400x560 marquee promo tile (JPEG, no alpha)
        run: |
          npx playwright test --project=marquee --reporter=list
          ffmpeg -y -hide_banner -loglevel error -i promo/marquee.png -frames:v 1 promo/markonator-marquee.jpg

      - name: Build 440x280 small promo tile (JPEG, no alpha)
        run: |
          npx playwright test --project=small-promo --reporter=list
          ffmpeg -y -hide_banner -loglevel error -i promo/small.png -frames:v 1 promo/markonator-small.jpg

      - name: Build promo video (1920x1080 MP4 for YouTube)
        run: bash scripts/make-promo-video.sh screenshots promo/markonator-promo.mp4

      - name: Attach all Web Store media to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.rel.outputs.tag }}" --clobber --repo ${{ github.repository }} \
            screenshots/markonator.gif \
            screenshots/markonator-hero.png \
            store-shots/1-plan-loaded.png \
            store-shots/2-writing-comment.png \
            store-shots/3-threaded-replies.png \
            store-shots/4-theme-and-font.png \
            store-shots/5-copy-agent-prompt.png \
            promo/markonator-marquee.jpg \
            promo/markonator-small.jpg \
            promo/markonator-promo.mp4 \
            icons/icon128.png

      - name: Summarize attached assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release view "${{ steps.rel.outputs.tag }}" --repo ${{ github.repository }} --json assets --jq '.assets[].name'
