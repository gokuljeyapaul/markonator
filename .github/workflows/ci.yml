name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Verify extension build
        run: python3 build.py

      - name: Run tests
        run: npx playwright test --project=chromium

      - name: Run release-zip conformance + page tests
        run: npx playwright test --project=zip

      - name: Install xvfb (for the headed unpacked-extension test)
        run: sudo apt-get install -y xvfb

      - name: Run unpacked-extension test (headed, under xvfb)
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" npx playwright test --project=extension --retries=2

      - name: Capture screenshots
        if: always()
        continue-on-error: true
        run: npx playwright test --project=screenshots --reporter=list

      - name: Install ffmpeg
        if: always()
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Build demo GIF
        if: always()
        continue-on-error: true
        run: bash scripts/make-gif.sh screenshots screenshots/markonator.gif

      - name: Generate 1280x800 Web Store screenshots
        if: always()
        continue-on-error: true
        run: bash scripts/make-store-shots.sh screenshots store-shots

      - name: Generate 1400x560 marquee promo tile
        if: always()
        continue-on-error: true
        run: |
          npx playwright test --project=marquee --reporter=list
          ffmpeg -y -hide_banner -loglevel error -i promo/marquee.png -frames:v 1 promo/markonator-marquee.jpg

      - name: Upload screenshots + GIF + store shots + marquee
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            screenshots/
            store-shots/
            promo/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
